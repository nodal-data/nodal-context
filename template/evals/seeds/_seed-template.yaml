# evals/seeds/<name>.seed.yaml — one harvested ground-truth pair.
# Written by the interview at the moment a disambiguation is confirmed.
question: "<a question a user might actually ask>"
domain: <domain>
intent: >
  <the confirmed correct meaning — including the disambiguation the naive reading
  would miss>
# ir: — OPTIONAL structured decomposition (schemas/ir.schema.json). Populate it
#   whenever the question decomposes to a metric defined in this domain's
#   metrics.yaml; it complements `intent`/`expected`, never replaces them.
# ir:
#   metric: <name in domains/<domain>/metrics.yaml>
#   dimensions: [<column>]
#   filters:
#     - field: <column>
#       op: <e.g. ilike | in | "<">
#       value: <literal or <placeholder>>
#   time_window: <relative token, e.g. last_quarter — keep evergreen seeds relative>
expected:
  kind: sql_shape              # semantic_entity | sql_shape | value_at_snapshot
  must_include: []             # for sql_shape
  must_exclude: []
  # entity: <name>             # for semantic_entity
  # value: <n>                 # for value_at_snapshot
  # as_of: "<YYYY-MM-DD>"      # for value_at_snapshot (pin it! quote it — a bare
  #                            #   date parses as a YAML date, not the string the schema wants)
provenance: interview          # interview | dashboard | correction | generated
status: confirmed              # confirmed | draft  (draft excluded from "perfect")
# verified_query_file: evals/verified/<name>.sql   # set ONLY on a Stage-5 verified
#   match — points at a LOCAL, gitignored sidecar holding the blessed read-only SQL.
#   The SQL body is kept OUT of git (it goes stale fast); only this pointer is committed.
lineage:
  - source: dbt_core
    models: []

# --- value_at_snapshot variant (a dashboard-verified seed, the strongest kind) ---
# Written by Stage 5 when the context-on answer matches the analyst's dashboard:
#
# question: "What was our collection rate by payer, last quarter?"
# domain: session-financials
# intent: >
#   Collection rate on adjudicated claims, state-specific payer resolution,
#   sessions >= 45 days old. (The confirmed assumptions the verified query used.)
# ir:                          # the decomposition the verified query actually used
#   metric: collection_rate
#   dimensions: [payer_name]
#   time_window: { start: "2026-01-01", end: "2026-03-31" }   # absolute is OK here —
#                              # expected.as_of pins this seed to a snapshot anyway
# expected:
#   kind: value_at_snapshot
#   value: 0.92                # the number the analyst read off the dashboard
#   as_of: "2026-03-31"        # pin it (quoted) — a live number with no snapshot tells you nothing
# provenance: dashboard
# status: confirmed
# verified_query_file: evals/verified/collection-rate.sql   # gitignored sidecar; SQL stays local
# lineage:
#   - source: dbt_core
#     models: [fct_session_financials]
