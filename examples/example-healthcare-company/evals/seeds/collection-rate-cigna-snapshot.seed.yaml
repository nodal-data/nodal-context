question: "What is our collection rate by payer, last quarter?"
domain: session-financials
intent: >
  Collection rate on adjudicated claims, resolved per state-specific payer (no
  cross-state aggregation), counting only sessions >= 45 days old. These are the
  assumptions the verified query encodes — confirmed against the "Collection Rate
  by Payer" dashboard.
ir:
  metric: collection_rate
  dimensions: [payer_name]
  time_window: { start: "2026-01-01", end: "2026-03-31" }  # absolute is OK here —
    # expected.as_of pins this seed to a snapshot anyway
expected:
  kind: value_at_snapshot
  value: 0.92
  as_of: "2026-03-31"   # quote it — bare YYYY-MM-DD parses as a date, not a string
provenance: dashboard
status: confirmed
# The blessed read-only SQL lives in a LOCAL, gitignored sidecar (evals/verified/),
# never committed — it goes stale fast and must not be cloneable from the repo. The
# seed keeps only this pointer; the answer key (value + as_of, above) stays in git.
verified_query_file: evals/verified/collection-rate-cigna-snapshot.sql
lineage:
  - source: dbt_core
    models: [fct_session_financials]
